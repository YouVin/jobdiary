name: CI

# dev, main 브랜치에 push하거나 PR 올릴 때 자동 실행
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      # 1. 코드 체크아웃
      - uses: actions/checkout@v4

      # 2. Node 세팅
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. 패키지 설치
      - name: Install dependencies
        run: npm ci

      # 4. Lint 검사
      - name: Lint
        run: npm run lint

      # 5. 빌드 확인
      - name: Build
        run: npm run build
